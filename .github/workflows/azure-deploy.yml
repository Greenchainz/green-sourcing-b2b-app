name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_CONTAINER_REGISTRY: acrgreenchainzprod916
  RESOURCE_GROUP: rg-greenchainz-prod-container
  FRONTEND_IMAGE_NAME: greenchainz-frontend
  BACKEND_IMAGE_NAME: greenchainz-backend
  FRONTEND_CONTAINER_APP: greenchainz-frontend
  BACKEND_CONTAINER_APP: greenchainz-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (Federated - Zero Secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR login server
        id: acr
        run: |
          ACR_LOGIN_SERVER=$(az acr show --name ${{ env.AZURE_CONTAINER_REGISTRY }} --query loginServer --output tsv)
          echo "login_server=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT

      - name: Build and Push Frontend Image
        run: |
          az acr build \
            --registry ${{ env.AZURE_CONTAINER_REGISTRY }} \
            --image ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.FRONTEND_IMAGE_NAME }}:latest \
            --file Dockerfile.azure \
            .

      - name: Deploy Frontend Container App
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ steps.acr.outputs.login_server }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}

      - name: Build and Push Backend Image
        run: |
          az acr build \
            --registry ${{ env.AZURE_CONTAINER_REGISTRY }} \
            --image ${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.BACKEND_IMAGE_NAME }}:latest \
            --file Dockerfile.backend \
            . || echo "Backend build skipped (no Dockerfile.backend found)"

      - name: Deploy Backend Container App
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ steps.acr.outputs.login_server }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} || echo "Backend deployment skipped"

      - name: Deployment Summary
        run: |
          echo "✅ Deployment complete!"
          echo "Frontend: https://greenchainz.com"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
